blueprint:
  name: "Appliance Orchestrator Pro v1.3.2"
  description: "Smart lifecycle manager with energy schedule awareness, watchdog, and actionable notifications."
  domain: automation
  input:
    appliance_name: { name: Appliance Name, selector: { text: {} } }
    switch_plug: { name: Smart Plug, selector: { entity: { domain: switch } } }
    power_sensor: { name: Power Sensor, selector: { entity: { domain: sensor, device_class: power } } }
    status_input: { name: Status Input Select, selector: { entity: { domain: input_select } } }
    schedule_valle: { name: Energy Schedule, selector: { entity: { domain: schedule } } }
    p_start: { name: "Start-up Power (W)", default: 3, selector: { number: { min: 1, max: 50, unit_of_measurement: W } } }
    p_working: { name: "Working Power Threshold (W)", default: 15, selector: { number: { min: 5, max: 100, unit_of_measurement: W } } }
    p_end: { name: "End-of-cycle Power (W)", default: 2, selector: { number: { min: 0, max: 10, unit_of_measurement: W } } }
    run_duration: { name: "Expected Cycle Duration (Minutes)", default: 70, selector: { number: { min: 1, max: 300, unit_of_measurement: min } } }
    wait_time: { name: "Watchdog/End Delay (Minutes)", default: 3, selector: { number: { min: 1, max: 20, unit_of_measurement: min } } }
    notify_dev: { name: Notification Service, selector: { text: {} } }
    msg_paused: { name: "Message: Paused", default: "Outside cheap window or insufficient time.", selector: { text: {} } }
    btn_label: { name: "Label: Bypass Button", default: "▶️ Start Now!", selector: { text: {} } }
    msg_error: { name: "Message: Error (Start-up / Door)", default: "No power draw detected. Check the door!", selector: { text: {} } }
    msg_anomaly: { name: "Message: Anomaly Detected", default: "Cycle finished abnormally. Please check.", selector: { text: {} } }
    msg_finished: { name: "Message: Finished", default: "Cycle completed at {{ now().strftime('%H:%M') }}", selector: { text: {} } }
    action_paused: { name: "Action: On Pause", default: [], selector: { action: {} } }
    action_error: { name: "Action: On Error/Anomaly", default: [], selector: { action: {} } }
    action_finished: { name: "Action: On Finished", default: [], selector: { action: {} } }

mode: parallel
max: 10

variables:
  status_entity: !input status_input
  schedule_entity: !input schedule_valle
  appliance: !input appliance_name
  notify_service: !input notify_dev
  duration_min: !input run_duration
  txt_paused: !input msg_paused
  txt_error: !input msg_error
  txt_anomaly: !input msg_anomaly
  txt_finished: !input msg_finished
  txt_btn: !input btn_label
  notif_tag: "orch_{{ this.entity_id }}"

trigger:
  - trigger: event
    event_type: mobile_app_notification_action
    event_data: { action: "WASH_NOW" }
    id: trig_bypass
  - trigger: numeric_state
    entity_id: !input power_sensor
    above: !input p_start
    for: "00:00:30"
    id: trig_admission
  - trigger: state
    entity_id: !input schedule_valle
    from: "off"
    to: "on"
    id: trig_restart
  - trigger: numeric_state
    entity_id: !input power_sensor
    below: !input p_end
    for: { minutes: !input wait_time }
    id: trig_end_cycle
  - trigger: state
    entity_id: !input status_input
    to: WAITING_FOR_WINDOW
    for: "00:05:00"
    id: trig_clean_notif

action:
  - choose:

      # --- 1. BYPASS ---
      - conditions:
          - condition: trigger
            id: trig_bypass
          - condition: template
            value_template: "{{ is_state(status_entity, 'WAITING_FOR_WINDOW') }}"
        sequence:
          - action: switch.turn_on
            target: { entity_id: !input switch_plug }
          - action: input_select.select_option
            target: { entity_id: !input status_input }
            data: { option: RUNNING }
          - action: "{{ notify_service }}"
            data: { message: "clear_notification", data: { tag: "{{ notif_tag }}" } }

      # --- 2. RESTART ---
      - conditions:
          - condition: trigger
            id: trig_restart
          - condition: template
            value_template: "{{ is_state(status_entity, 'WAITING_FOR_WINDOW') }}"
        sequence:
          - action: switch.turn_on
            target: { entity_id: !input switch_plug }
          - action: input_select.select_option
            target: { entity_id: !input status_input }
            data: { option: RUNNING }
          - action: "{{ notify_service }}"
            data: { message: "clear_notification", data: { tag: "{{ notif_tag }}" } }

      # --- 3. NOTIFICATION CLEANUP ---
      - conditions:
          - condition: trigger
            id: trig_clean_notif
        sequence:
          - action: "{{ notify_service }}"
            data: { message: "clear_notification", data: { tag: "{{ notif_tag }}" } }

      # --- 4. ADMISSION ---
      - conditions:
          - condition: trigger
            id: trig_admission
          - condition: template
            value_template: "{{ is_state(status_entity, 'IDLE') or is_state(status_entity, 'WAITING_FOR_WINDOW') }}"
        sequence:
          - variables:
              is_cheap: "{{ is_state(schedule_entity, 'on') }}"
              next_ev: "{{ state_attr(schedule_entity, 'next_event') }}"
              time_needed: "{{ (duration_min | int) * 60 }}"
              is_too_late: >
                {% if not is_cheap %}
                  true
                {% elif next_ev is none or next_ev == '' %}
                  false
                {% else %}
                  {{ (as_timestamp(next_ev, default=0) - as_timestamp(now())) < (time_needed | int) }}
                {% endif %}
              was_waiting: "{{ is_state(status_entity, 'WAITING_FOR_WINDOW') }}"
          - if:
              - condition: template
                value_template: "{{ is_too_late }}"
            then:
              - action: switch.turn_off
                target: { entity_id: !input switch_plug }
              - action: input_select.select_option
                target: { entity_id: !input status_input }
                data: { option: WAITING_FOR_WINDOW }
              - if:
                  - condition: template
                    value_template: "{{ not was_waiting }}"
                then:
                  - action: "{{ notify_service }}"
                    data:
                      title: "🕒 {{ appliance }}"
                      message: "{{ txt_paused }}"
                      data: { tag: "{{ notif_tag }}", actions: [{ action: "WASH_NOW", title: "{{ txt_btn }}" }] }
                  - choose: []
                    default: !input action_paused
            else:
              - action: input_select.select_option
                target: { entity_id: !input status_input }
                data: { option: RUNNING }
              - action: switch.turn_on
                target: { entity_id: !input switch_plug }

      # --- 5. WATCHDOG ---
      - conditions:
          - condition: trigger
            id: trig_end_cycle
          - condition: template
            value_template: "{{ is_state(status_entity, 'RUNNING') }}"
        sequence:
          - variables:
              start_ts: "{{ as_timestamp(states[status_entity].last_changed) }}"
              actual_dur: "{{ [(as_timestamp(now()) - start_ts | float) / 60, 0] | max | int }}"
              t_ref: "{{ duration_min | int }}"
              is_startup_err: "{{ actual_dur < (t_ref * 0.05) }}"
              is_success: "{{ actual_dur >= (t_ref * 0.75) and actual_dur <= (t_ref * 1.5) }}"
          - choose:
              - conditions: "{{ is_startup_err }}"
                sequence:
                  - action: input_select.select_option
                    target: { entity_id: !input status_input }
                    data: { option: ERROR }
                  - action: "{{ notify_service }}"
                    data:
                      title: "⚠️ {{ appliance }}"
                      message: "{{ txt_error }} ({{ actual_dur }}min)"
                      data: { tag: "{{ notif_tag }}", priority: high }
                  - choose: []
                    default: !input action_error
              - conditions: "{{ is_success }}"
                sequence:
                  - action: input_select.select_option
                    target: { entity_id: !input status_input }
                    data: { option: IDLE }
                  - action: "{{ notify_service }}"
                    data:
                      title: "✅ {{ appliance }}"
                      message: "{{ txt_finished }}"
                      data: { tag: "{{ notif_tag }}" }
                  - choose: []
                    default: !input action_finished
            default:
              - action: input_select.select_option
                target: { entity_id: !input status_input }
                data: { option: ERROR }
              - action: "{{ notify_service }}"
                data:
                  title: "❌ {{ appliance }}"
                  message: "{{ txt_anomaly }} ({{ actual_dur }}min / Ref: {{ t_ref }}min)"
                  data: { tag: "{{ notif_tag }}", priority: high }
              - choose: []
                default: !input action_error