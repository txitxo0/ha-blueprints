blueprint:
  name: "Appliance Orchestrator Pro v1.2.0"
  description: "Advanced lifecycle manager with unified anomaly detection."
  domain: automation
  input:
    # ... (Se mantienen los inputs previos de sensores y entidades)
    appliance_name:
      name: Appliance Name
      selector: { text: {} }
    switch_plug:
      name: Smart Plug
      selector: { entity: { domain: switch } }
    power_sensor:
      name: Power Sensor
      selector: { entity: { domain: sensor, device_class: power } }
    status_input:
      name: Status Input Select
      selector: { entity: { domain: input_select } }
    schedule_valle:
      name: Energy Schedule
      selector: { entity: { domain: schedule } }
    p_start:
      name: Start-up Power (W)
      default: 3
      selector: { number: { min: 1, max: 50, unit_of_measurement: W } }
    p_working:
      name: Working Power Threshold (W)
      default: 15
      selector: { number: { min: 5, max: 100, unit_of_measurement: W } }
    p_end:
      name: End-of-cycle Power (W)
      default: 2
      selector: { number: { min: 0, max: 10, unit_of_measurement: W } }
    run_duration:
      name: Expected Cycle Duration (Minutes)
      default: 70
      selector: { number: { min: 1, max: 300, unit_of_measurement: min } }
    wait_time:
      name: Watchdog/End Delay (Minutes)
      default: 3
      selector: { number: { min: 1, max: 20, unit_of_measurement: min } }
    notify_dev:
      name: Notification Service
      selector: { text: {} }
    msg_paused:
      name: "Message: Paused"
      default: "Outside cheap window or insufficient time."
      selector: { text: {} }
    btn_label:
      name: "Label: Bypass Button"
      default: "▶️ Start Now"
      selector: { text: {} }
    msg_error:
      name: "Message: Error (Start-up / Door)"
      default: "No power draw detected. Check the door!"
      selector: { text: {} }
    msg_anomaly:
      name: "Message: Anomaly Detected"
      default: "Cycle finished abnormally. Please check."
      selector: { text: {} }
    msg_finished:
      name: "Message: Finished"
      default: "Cycle completed successfully at {{ now().strftime('%H:%M') }}"
      selector: { text: {} }
    action_paused:
      name: "Action: On Pause"
      default: []
      selector: { action: {} }
    action_error:
      name: "Action: On Error/Anomaly"
      default: []
      selector: { action: {} }
    action_finished:
      name: "Action: On Finished"
      default: []
      selector: { action: {} }

mode: parallel
max: 10

variables:
  status_entity: !input status_input
  schedule_entity: !input schedule_valle
  appliance: !input appliance_name
  notify_service: !input notify_dev
  duration_min: !input run_duration
  txt_paused: !input msg_paused
  txt_error: !input msg_error
  txt_anomaly: !input msg_anomaly
  txt_finished: !input msg_finished
  txt_btn: !input btn_label
  notif_tag: "orch_{{ this.entity_id }}"

trigger:
  - trigger: event
    event_type: mobile_app_notification_action
    event_data: { action: "WASH_NOW" }
    id: trig_bypass
  - trigger: numeric_state
    entity_id: !input power_sensor
    above: !input p_start
    for: "00:00:30"
    id: trig_admission
  - trigger: state
    entity_id: !input schedule_valle
    from: "off"
    to: "on"
    id: trig_restart
  - trigger: numeric_state
    entity_id: !input power_sensor
    below: !input p_end
    for: { minutes: !input wait_time }
    id: trig_end_cycle
  - trigger: state
    entity_id: !input status_input
    to: WAITING_FOR_WINDOW
    for: "00:05:00"
    id: trig_clean_notif

action:
  - choose:
      # 1. BYPASS O REINICIO
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.id == 'trig_bypass' or 
                 (trigger.id == 'trig_restart' and is_state(status_entity, 'WAITING_FOR_WINDOW')) }}
        sequence:
          - action: switch.turn_on
            target: { entity_id: !input switch_plug }
          - action: input_select.select_option
            target: { entity_id: !input status_input }
            data: { option: RUNNING }
          - action: "{{ notify_service }}"
            data: { message: "clear_notification", data: { tag: "{{ notif_tag }}" } }

      # 2. LIMPIEZA AUTOMÁTICA
      - conditions:
          - condition: trigger
            id: trig_clean_notif
        sequence:
          - action: "{{ notify_service }}"
            data: { message: "clear_notification", data: { tag: "{{ notif_tag }}" } }

      # 3. ADMISIÓN
      - conditions:
          - condition: trigger
            id: trig_admission
          - condition: template
            value_template: "{{ states(status_entity) in ['IDLE', 'WAITING_FOR_WINDOW', 'ERROR'] }}"
        sequence:
          - variables:
              is_cheap: "{{ is_state(schedule_entity, 'on') }}"
              next_ev: "{{ state_attr(schedule_entity, 'next_event') }}"
              time_needed: "{{ (duration_min | int) * 60 }}"
              is_too_late: >
                {% if is_cheap and next_ev is not none %}
                  {{ (as_timestamp(next_ev, default=0) - as_timestamp(now())) < time_needed | int }}
                {% else %}
                  {{ not is_cheap }}
                {% endif %}
          - if:
              - condition: template
                value_template: "{{ is_too_late and not is_state(status_entity, 'ERROR') }}"
            then:
              - action: switch.turn_off
                target: { entity_id: !input switch_plug }
              - action: input_select.select_option
                target: { entity_id: !input status_input }
                data: { option: WAITING_FOR_WINDOW }
              - action: "{{ notify_service }}"
                data:
                  title: "🕒 {{ appliance }}"
                  message: "{{ txt_paused }}"
                  data: { tag: "{{ notif_tag }}", actions: [{action: "WASH_NOW", title: "{{ txt_btn }}"}] }
              - choose: []
                default: !input action_paused
            else:
              - action: input_select.select_option
                target: { entity_id: !input status_input }
                data: { option: RUNNING }

      # 4. FIN DE CICLO Y GESTIÓN AUTOMÁTICA DE ANOMALÍAS
      - conditions:
          - condition: trigger
            id: trig_end_cycle
          - condition: template
            value_template: "{{ is_state(status_entity, 'RUNNING') }}"
        sequence:
          - variables:
              state_obj: "{{ states[status_entity] }}"
              start_ts: "{{ as_timestamp(state_obj.last_changed if state_obj is not none else now(), default=as_timestamp(now())) }}"
              actual_dur: "{{ ((as_timestamp(now()) - start_ts) / 60) | int }}"
              t_ref: "{{ duration_min | int }}"
              # Rangos lógicos
              is_startup_err: "{{ actual_dur < (t_ref * 0.05) }}"
              is_success: "{{ (actual_dur >= (t_ref * 0.75)) and (actual_dur <= (t_ref * 1.25)) }}"
          
          - choose:
              # CASO A: Fallo crítico de inicio
              - conditions: "{{ is_startup_err }}"
                sequence:
                  - action: input_select.select_option
                    target: { entity_id: !input status_input }
                    data: { option: ERROR }
                  - action: "{{ notify_service }}"
                    data:
                      title: "⚠️ {{ appliance }}"
                      message: "{{ txt_error }} ({{ actual_dur }}min)"
                      data: { tag: "{{ notif_tag }}", priority: high }
                  - choose: []
                    default: !input action_error

              # CASO B: Ciclo finalizado con éxito (75% - 125%)
              - conditions: "{{ is_success }}"
                sequence:
                  - action: input_select.select_option
                    target: { entity_id: !input status_input }
                    data: { option: IDLE }
                  - action: "{{ notify_service }}"
                    data:
                      title: "✅ {{ appliance }}"
                      message: "{{ txt_finished }}"
                      data: { tag: "{{ notif_tag }}" }
                  - choose: []
                    default: !input action_finished

            # CASO DEFAULT: Anomalía (fuera de rango y no es startup error)
            default:
              - action: input_select.select_option
                target: { entity_id: !input status_input }
                data: { option: ERROR }
              - action: "{{ notify_service }}"
                data:
                  title: "❌ {{ appliance }}"
                  message: "{{ txt_anomaly }} ({{ actual_dur }}min / Ref: {{ t_ref }}min)"
                  data: { tag: "{{ notif_tag }}", priority: high }
              - choose: []
                default: !input action_error